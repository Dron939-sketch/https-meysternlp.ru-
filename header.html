<style>

<script>
// Функция для подсветки активного пункта меню (как на главной)
function highlightCurrentPage() {
  const currentPath = window.location.pathname;
  const navLinks = document.querySelectorAll('.nav-link');
  
  navLinks.forEach(link => {
    const href = link.getAttribute('href');
    // Убираем базовый путь для сравнения
    const cleanHref = href.replace('/https-meysternlp.ru-', '');
    const cleanPath = currentPath.replace('/https-meysternlp.ru-', '');
    
    // Проверяем точное совпадение или начало пути
    if (cleanPath === cleanHref || 
        (cleanHref !== '/' && cleanPath.startsWith(cleanHref + '/')) ||
        (cleanHref === '/' && cleanPath === '/')) {
      link.classList.add('active');
    } else {
      link.classList.remove('active');
    }
  });
}

// Функция для работы бургер-меню
function initBurger() {
  const burger = document.getElementById('burgerBtn');
  const nav = document.getElementById('main-nav');
  
  if (burger && nav) {
    burger.addEventListener('click', () => {
      burger.classList.toggle('active');
      nav.classList.toggle('active');
      // Блокируем скролл body при открытом меню
      if (nav.classList.contains('active')) {
        document.body.style.overflow = 'hidden';
      } else {
        document.body.style.overflow = '';
      }
    });
    
    // Закрываем меню при клике на ссылку
    nav.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        burger.classList.remove('active');
        nav.classList.remove('active');
        document.body.style.overflow = '';
      });
    });
    
    // Закрываем меню при изменении размера окна (если стали десктопом)
    window.addEventListener('resize', () => {
      if (window.innerWidth > 768) {
        burger.classList.remove('active');
        nav.classList.remove('active');
        document.body.style.overflow = '';
      }
    });
  }
}

// Запускаем после загрузки страницы
document.addEventListener('DOMContentLoaded', () => {
  highlightCurrentPage();
  initBurger();
});
</script>
